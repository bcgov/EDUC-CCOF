name: Selenium end-to-end tests

on:
  workflow_dispatch:
    inputs:
      testFile:
        description: 'Path to Selenium test file'
        required: true
        default: 'test/selenium/src/test/java/ca/bc/gov/ecc/ccof/testcases/TestValidLogin.java'

jobs:
  selenium-run:
    name: Run Selenium E2E tests
    runs-on: ubuntu-24.04
    environment: qa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'
          cache: maven

      - name: Install Chrome
        run: |
          set -eux
          echo "Updating package lists..."
          sudo apt update
          echo "Installing required dependencies..."
          sudo apt install -y wget fonts-liberation libasound2t64 libnss3 libgbm1 xdg-utils
          echo "Attempting to download google-chrome-stable..."
          wget -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          echo "Installing google-chrome-stable..."
          sudo dpkg -i /tmp/chrome.deb || sudo apt -f install -y
          echo "Verifying Chrome installation..."
          google-chrome --version

      - name: Create root-level config.properties (QA only)
        env:
          CRM_URL: ${{ secrets.E2E_CRM_URL }}
          CRM_USERNAME: ${{ secrets.E2E_CRM_USERNAME }}
          CRM_PASSWORD: ${{ secrets.E2E_CRM_PASSWORD }}
        working-directory: test/selenium
        run: |
          set -eu
          set +H
          echo "Creating config.properties file with QA credentials..."
          # Write headless=false so tests run in headed mode (visible browser). The runner will start Xvfb below.
          printf 'env=QA\nQA.url=%s\ncrm_username=%s\ncrm_password=%s\nbrowser=CHROME\nheadless=false\n' \
            "$CRM_URL" "$CRM_USERNAME" "$CRM_PASSWORD" > config.properties
          echo "config.properties created successfully."

      - name: Install and start Xvfb (virtual display for headed browser)
        run: |
          echo "Installing and starting Xvfb so Chrome can run in headed mode..."
          sudo apt-get update
          sudo apt-get install -y xvfb
          # Start Xvfb on display :99 in background and set DISPLAY for subsequent steps
          nohup Xvfb :99 -screen 0 1920x1080x24 >/tmp/xvfb.log 2>&1 &
          # Export DISPLAY in this step's shell; subsequent steps in the same job will inherit the environment from the runner
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 1

      - name: Build & run tests
        working-directory: test/selenium
        run: |
          echo "Starting Maven build and running Selenium tests..."
          # Determine test class name from the workflow_dispatch input.
          INPUT="${{ github.event.inputs.testFile }}"
          echo "Received testFile input: $INPUT"
          # If input is a path or ends with .java, extract basename without extension.
          if [[ "$INPUT" == *.java ]] || [[ "$INPUT" == */* ]]; then
            TEST_CLASS="$(basename "$INPUT" .java)"
          elif [[ "$INPUT" == *.* ]]; then
            # If input looks like a fully-qualified class name, take the simple class name.
            TEST_CLASS="${INPUT##*.}"
          else
            # Otherwise assume it's already a class name or pattern.
            TEST_CLASS="$INPUT"
          fi
          echo "Running Maven for test class/pattern: $TEST_CLASS"
          mvn -B -ntp -Dtest="$TEST_CLASS" test
          echo "Maven build and tests completed."
