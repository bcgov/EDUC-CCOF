name: Selenium end-to-end tests

on:
  workflow_dispatch:
    inputs:
      testFile:
        description: 'Path to Selenium test file'
        required: true
        default: 'test/selenium/src/test/java/ca/bc/gov/ecc/ccof/testcases/TestValidLogin.java'

jobs:
  selenium-run:
    name: Run Selenium E2E tests
    runs-on: ubuntu-24.04
    environment: qa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'
          cache: maven

      - name: Install Chrome
        run: |
          set -eux
          echo "Updating package lists..."
          sudo apt update
          echo "Installing required dependencies..."
          sudo apt install -y wget fonts-liberation libasound2t64 libnss3 libgbm1 xdg-utils
          echo "Attempting to download google-chrome-stable..."
          wget -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          echo "Installing google-chrome-stable..."
          sudo dpkg -i /tmp/chrome.deb || sudo apt -f install -y
          echo "Verifying Chrome installation..."
          google-chrome --version

      - name: Create root-level config.properties (QA only)
        env:
          CRM_URL: ${{ secrets.E2E_CRM_URL }}
          CRM_USERNAME: ${{ secrets.E2E_CRM_USERNAME }}
          CRM_PASSWORD: ${{ secrets.E2E_CRM_PASSWORD }}
        working-directory: test/selenium
        run: |
          set -eu
          set +H
          echo "Creating config.properties file with QA credentials..."
          printf 'env=QA\nQA.url=%s\ncrm_username=%s\ncrm_password=%s\nbrowser=CHROME\nheadless=true\n' \
            "$CRM_URL" "$CRM_USERNAME" "$CRM_PASSWORD" > config.properties
          echo "config.properties created successfully."

      - name: Build & run tests
        working-directory: test/selenium
        run: |
          echo "Starting Maven build and running Selenium tests..."
          # Determine test class name from the workflow_dispatch input.
          INPUT="${{ github.event.inputs.testFile }}"
          echo "Received testFile input: $INPUT"
          # If input is a path or ends with .java, extract basename without extension.
          if [[ "$INPUT" == *.java ]] || [[ "$INPUT" == */* ]]; then
            TEST_CLASS="$(basename "$INPUT" .java)"
          elif [[ "$INPUT" == *.* ]]; then
            # If input looks like a fully-qualified class name, take the simple class name.
            TEST_CLASS="${INPUT##*.}"
          else
            # Otherwise assume it's already a class name or pattern.
            TEST_CLASS="$INPUT"
          fi
          echo "Running Maven for test class/pattern: $TEST_CLASS"
          mvn -B -ntp -Dtest="$TEST_CLASS" test
          echo "Maven build and tests completed."
          # Temp screenshot save
      - name: Create screenshot index (if any)
        if: always()
        working-directory: test/selenium
        run: |
          # Ensure screenshots directory exists so upload step won't fail
          mkdir -p target/screenshots

          # Create a simple index.html listing screenshots for easier viewing after download
          INDEX=target/screenshots/index.html
          echo "<html><body><h1>Screenshots</h1>" > "$INDEX"
          for img in target/screenshots/*.png; do
            if [ -f "$img" ]; then
              name=$(basename "$img")
              echo "<div style='margin:12px'><a href=\"$name\"><img src=\"$name\" style='max-width:800px'></a><br>$name</div>" >> "$INDEX"
            fi
          done
          echo "</body></html>" >> "$INDEX"

      - name: List screenshots (debug)
        if: always()
        working-directory: test/selenium
        run: |
          echo "Screenshot dir contents (for debug):"
          ls -la target/screenshots || echo "(no screenshots found)"

      - name: Upload Selenium screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-screenshots
          path: test/selenium/target/screenshots/**
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: test/selenium/target/surefire-reports/**
          if-no-files-found: warn
          retention-days: 7

      - name: Add job summary note
        if: always()
        run: |
          echo "Screenshots (if any) and test reports uploaded as artifacts: 'selenium-screenshots' and 'surefire-reports'." >> $GITHUB_STEP_SUMMARY

