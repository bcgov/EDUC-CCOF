name: Selenium end-to-end tests

on:
  workflow_dispatch:
    inputs:
      testFile:
        description: 'Path to Selenium test file'
        required: true
        default: 'test/selenium/src/test/java/ca/bc/gov/ecc/ccof/testcases/TestValidLogin.java'

jobs:
  selenium-run:
    name: Run Selenium E2E tests
    runs-on: ubuntu-24.04
    environment: qa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'
          cache: maven

      - name: Install Chrome
        run: |
          set -eux
          echo "Updating package lists..."
          sudo apt update
          echo "Installing required dependencies..."
          sudo apt install -y wget fonts-liberation libasound2t64 libnss3 libgbm1 xdg-utils
          echo "Attempting to download google-chrome-stable..."
          wget -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          echo "Installing google-chrome-stable..."
          sudo dpkg -i /tmp/chrome.deb || sudo apt -f install -y
          echo "Verifying Chrome installation..."
          google-chrome --version

      - name: Create root-level config.properties (QA only)
        env:
          CRM_URL: ${{ secrets.E2E_CRM_URL }}
          CRM_USERNAME: ${{ secrets.E2E_CRM_USERNAME }}
          CRM_PASSWORD: ${{ secrets.E2E_CRM_PASSWORD }}
        working-directory: test/selenium
        run: |
          set -eu
          set +H
          echo "Creating config.properties file with QA credentials (sanitizing secrets)..."
          # Sanitize inputs to remove stray CR/LF and trim leading/trailing whitespace for username
          CRM_URL_S=$(printf '%s' "$CRM_URL" | tr -d '\r\n')
          CRM_USERNAME_S=$(printf '%s' "$CRM_USERNAME" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          CRM_PASSWORD_S=$(printf '%s' "$CRM_PASSWORD" | tr -d '\r\n')

          # Write headless=true so tests run in headless browser mode on the runner.
          printf 'env=QA\nQA.url=%s\ncrm_username=%s\ncrm_password=%s\nbrowser=CHROME\nheadless=true\n' \
            "$CRM_URL_S" "$CRM_USERNAME_S" "$CRM_PASSWORD_S" > config.properties
          echo "config.properties created successfully (sanitized)."
          # TEMP logging
      - name: Safe secret parsing verification (non-leaking)
        if: always()
        env:
          CRM_USERNAME: ${{ secrets.E2E_CRM_USERNAME }}
          CRM_PASSWORD: ${{ secrets.E2E_CRM_PASSWORD }}
        working-directory: test/selenium
        run: |
          set -eu
          set +H
          echo "Verifying CRM_USERNAME and CRM_PASSWORD parsing (safe checks)..."

          # CRM_USERNAME checks (non-leaking boolean outputs)
          U_RAW=$(printf '%s' "$CRM_USERNAME")

          # Check leading/trailing whitespace
          U_TRIMMED=$(printf '%s' "$U_RAW" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          if [ "$(printf '%s' "$U_RAW" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')" != "$U_RAW" ]; then
            echo "CRM_USERNAME has leading or trailing whitespace: YES"
          else
            echo "CRM_USERNAME has leading or trailing whitespace: NO"
          fi

          if printf '%s' "$U_RAW" | grep -q '@'; then
            echo "CRM_USERNAME contains '@': YES"
          else
            echo "CRM_USERNAME contains '@': NO"
          fi

          # Case-insensitive domain match to be robust
          if printf '%s' "$U_RAW" | grep -qi '@gov\.bc\.ca$'; then
            echo "CRM_USERNAME ends with '@gov.bc.ca' (case-insensitive): YES"
          else
            echo "CRM_USERNAME ends with '@gov.bc.ca' (case-insensitive): NO"
          fi

          if printf '%s' "$U_RAW" | grep -q $'\n'; then
            echo "CRM_USERNAME contains newline/control characters: YES"
          else
            echo "CRM_USERNAME contains newline/control characters: NO"
          fi

          if printf '%s' "$U_RAW" | grep -q '[[:space:]]'; then
            echo "CRM_USERNAME contains spaces: YES"
          else
            echo "CRM_USERNAME contains spaces: NO"
          fi

          # CRM_PASSWORD checks (non-leaking boolean outputs only)
          P_RAW=$(printf '%s' "$CRM_PASSWORD")

          if printf '%s' "$P_RAW" | grep -q $'\n'; then
            echo "CRM_PASSWORD contains newline/control characters: YES"
          else
            echo "CRM_PASSWORD contains newline/control characters: NO"
          fi

          if printf '%s' "$P_RAW" | grep -q '[[:space:]]'; then
            echo "CRM_PASSWORD contains spaces: YES"
          else
            echo "CRM_PASSWORD contains spaces: NO"
          fi

          # Check whether password ends with an exclamation mark (no character leakage)
          if printf '%s' "$P_RAW" | grep -q '!$'; then
            echo "CRM_PASSWORD ends with '!': YES"
          else
            echo "CRM_PASSWORD ends with '!': NO"
          fi

          echo "Safe parsing verification complete."

      - name: Build & run tests
        working-directory: test/selenium
        run: |
          echo "Starting Maven build and running Selenium tests..."
          # Determine test class name from the workflow_dispatch input.
          INPUT="${{ github.event.inputs.testFile }}"
          echo "Received testFile input: $INPUT"
          # If input is a path or ends with .java, extract basename without extension.
          if [[ "$INPUT" == *.java ]] || [[ "$INPUT" == */* ]]; then
            TEST_CLASS="$(basename "$INPUT" .java)"
          elif [[ "$INPUT" == *.* ]]; then
            # If input looks like a fully-qualified class name, take the simple class name.
            TEST_CLASS="${INPUT##*.}"
          else
            # Otherwise assume it's already a class name or pattern.
            TEST_CLASS="$INPUT"
          fi
          echo "Running Maven for test class/pattern: $TEST_CLASS"

          # Ensure screenshots directory exists (TestListener writes here)
          mkdir -p screenshots

          # Run mvn directly (headless Chrome). Capture exit code so artifacts can still be uploaded on failure.
          mvn -B -ntp -Dtest="$TEST_CLASS" test; EXIT_CODE=$?; echo $EXIT_CODE > maven-exit-code.txt
          echo "Maven finished with exit code $(cat maven-exit-code.txt)"
