name: Zap Scan Node

env:
  BRANCH: ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      env:
        description: 'The openshift environment to scan'
        default: 'dev'
        type: choice
        options:
        - 'dev'
        - 'qa'
        - 'test'
        - 'efx'
        - 'prod'
  workflow_call:
    inputs:
      env:
        description: 'The openshift environment to scan'
        default: 'dev'
        type: string

jobs:
  zap:
    name: Run Zap Scan
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    environment: ${{ inputs.env }}
    steps:
      - name: Check out repository with branch [${{ env.BRANCH }}]
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5a #v4.3.1
        with:
          ref: ${{ env.BRANCH }}
          persist-credentials: false
      - name: ZAP Scan
        uses: zaproxy/action-full-scan@3c58388149901b9a03b7718852c5ba889646c27c #v0.13
        with:
          target: "https://${{ secrets.SITE_URL }}/api"
          artifact_name: ccof_backend_${{ inputs.env }}
          fail_action: true              # fail the job if alerts found
          allow_issue_writing: false     # don't open/update a GitHub Issue
          rules_file_name: .zap/rules-backend.tsv
