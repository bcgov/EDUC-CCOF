name: Cypress end-to-end tests
on:
  workflow_dispatch:
    inputs:
      testFile:
        description: 'Path to Cypress test file'
        required: true
        default: '1-portal-login/portal-login-happy-path-e2e.cy.js'
jobs:
  cypress-run:
    name: Run Cypress E2E tests
    runs-on: ubuntu-24.04
    environment: dev
    steps:
      - name: Print Workflow Dispatch Inputs and Env Vars
        uses: shayki5/print-workflow-dispatch-inputs@d33d9a2262e8c0b8c726540184b654402705a87f #v1.0.1
        with:
          add_to_summary: "true"
          print_env_vars: "false"

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5a #v4.3.1

      - name: Cypress run
        uses: cypress-io/github-action@f790eee7a50d9505912f50c2095510be7de06aa7 #v6.10.9
        with:
          working-directory: ./test/cypress-e2e
          browser: electron
          wait-on: ${{ secrets.CYPRESS_PORTAL_BASE_URL }}
          spec: ./cypress/e2e/${{ github.event.inputs.testFile }}
        env:
          CYPRESS_PORTAL_USERNAME: ${{ secrets.CYPRESS_PORTAL_USERNAME }}
          CYPRESS_PORTAL_PASSWORD: ${{ secrets.CYPRESS_PORTAL_PASSWORD }}
          CYPRESS_PORTAL_BASE_URL: ${{ secrets.CYPRESS_PORTAL_BASE_URL }}

      - name: Upload screenshots
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 #v4.6.2
        if: always()
        with:
          name: cypress-screenshots
          path: test/cypress-e2e/cypress/screenshots
